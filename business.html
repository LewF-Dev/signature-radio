<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Signature Radio UK — Business and advertising opportunities across Bristol, North Somerset and South Gloucestershire." />
  <meta name="robots" content="index, follow" />
  <title>Business — Signature Radio UK</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="ticker-mount"></div>
  <div id="nav-mount"></div>

  <main>
    <section class="section page-section" aria-labelledby="business-heading">
      <div class="container">
        <h1 class="section-heading" id="business-heading">BUSINESS &amp; ADVERTISING</h1>

        <div class="business-grid">

          <div class="business-intro">
            <p class="section-intro">Reach 1.2 million people across Bristol, North Somerset, and South Gloucestershire. For advertising, sponsorship, and commercial enquiries:</p>
            <a href="mailto:info@signatureradio.uk" class="link-red">info@signatureradio.uk</a>
          </div>

          <!-- Slideshow -->
          <div class="slideshow-outer">
            <button class="slideshow-btn slideshow-prev" id="slideshowPrev" aria-label="Previous slide">&#8249;</button>
            <div class="slideshow" id="slideshow" aria-label="Business presentation">
              <div class="slideshow-track">
                <img src="slides/slideshow-slide-1.png"  alt="Slide 1"  class="slide active" />
                <img src="slides/slideshow-slide-2.png"  alt="Slide 2"  class="slide" />
                <img src="slides/slideshow-slide-3.png"  alt="Slide 3"  class="slide" />
                <img src="slides/slideshow-slide-4.png"  alt="Slide 4"  class="slide" />
                <img src="slides/slideshow-slide-5.png"  alt="Slide 5"  class="slide" />
                <img src="slides/slideshow-slide-6.png"  alt="Slide 6"  class="slide" />
                <img src="slides/slideshow-slide-7.png"  alt="Slide 7"  class="slide" />
                <img src="slides/slideshow-slide-8.png"  alt="Slide 8"  class="slide" />
                <img src="slides/slideshow-slide-9.png"  alt="Slide 9"  class="slide" />
                <img src="slides/slideshow-slide-10.png" alt="Slide 10" class="slide" />
                <img src="slides/slideshow-slide-11.png" alt="Slide 11" class="slide" />
              </div>
              <div class="slideshow-dots" id="slideshowDots" aria-hidden="true"></div>
            </div>
            <button class="slideshow-btn slideshow-next" id="slideshowNext" aria-label="Next slide">&#8250;</button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="partials.js"></script>
  <script src="main.js"></script>
  <script src="supabase-config.js"></script>
  <script src="presenter-auth.js"></script>
</body>
</html>
