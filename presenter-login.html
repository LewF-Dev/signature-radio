<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Presenter Login — Signature Radio UK</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="ticker-mount"></div>
  <header class="hero" role="banner">
    <div class="hero-content">
      <div class="hero-brand">
        <img src="logo.jpg" alt="Signature Radio UK" class="hero-logo" />
      </div>
    </div>
    <div class="hero-image" aria-hidden="true">
      <img src="Best-Afro-Hair_Venus-removebg-preview.avif" alt="" class="hero-img" />
    </div>
  </header>
  <div id="nav-mount"></div>

  <main>
    <section class="section page-section" aria-labelledby="login-heading">
      <div class="container">
        <div class="login-wrap">
          <h1 class="section-heading" id="login-heading">PRESENTER LOGIN</h1>
          <p class="login-intro">This area is for Signature Radio UK presenters only.</p>

          <form class="login-form" id="loginForm" novalidate>
            <div class="form-group">
              <label for="loginEmail" class="form-label">Email</label>
              <input
                type="email"
                id="loginEmail"
                class="form-input"
                autocomplete="email"
                required
                placeholder="your@email.com"
              />
            </div>
            <div class="form-group">
              <label for="loginPassword" class="form-label">Password</label>
              <input
                type="password"
                id="loginPassword"
                class="form-input"
                autocomplete="current-password"
                required
                placeholder="••••••••"
              />
            </div>
            <p class="login-error" id="loginError" role="alert" aria-live="polite"></p>
            <button type="submit" class="btn-primary" id="loginBtn">SIGN IN</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="partials.js"></script>
  <script src="main.js"></script>
  <script src="supabase-config.js"></script>
  <script src="presenter-auth.js"></script>
</body>
</html>
